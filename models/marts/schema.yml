version: 2

models:
  - name: mart_customer_performance
    description: "High-level summary of customer lifetime value metrics. Sourced directly from dim_customers."
    columns:
      - name: customer_id
        description: "The unique primary key for the customer."
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "The current name of the customer."
      - name: total_orders
        description: "The cumulative count of all orders placed by this customer."
        tests:
          - not_null
      - name: first_ordered_at
        description: "The timestamp of the customer's very first purchase."
      - name: last_ordered_at
        description: "The timestamp of the customer's most recent purchase."
      - name: lifetime_order_total
        description: "The total gross revenue generated by this customer across their entire history."
        tests:
          - not_null
      - name: average_order_value
        description: "The average spend per transaction (lifetime_order_total / total_orders). Defaults to 0 if total_orders is 0."

  - name: mart_daily_revenue
    description: "Daily aggregated financial summary broken down by date, store location, and overall revenue categories."
    columns:
      - name: ordered_date
        description: "The calendar date for the aggregated business day."
        tests:
          - not_null
      - name: store_id
        description: "The unique identifier of the physical or digital retail store."
        tests:
          - not_null
      - name: store_name
        description: "The human-readable display name of the store."
      - name: total_orders
        description: "Total distinct orders processed by this store on this day."
        tests:
          - not_null
      - name: total_items_sold
        description: "Total volume of individual items sold across all transactions."
      - name: gross_item_revenue
        description: "Sum of individual unit item prices before store-wide discounts, adjustments, or tax additions."
      - name: subtotal_revenue
        description: "The aggregated order subtotal baseline for the day."
      - name: tax_revenue
        description: "The aggregated amount of tax processed and collected for the day."
      - name: total_revenue
        description: "The complete final processed gross financial revenue (subtotal + tax)."
        tests:
          - not_null

  - name: mart_product_performance
    description: "Product-centric performance log matching product metadata against core transaction sales data volumes."
    columns:
      - name: product_sku
        description: "The unique master Stock Keeping Unit tracking code for the product."
        tests:
          - unique
          - not_null
      - name: product_name
        description: "The catalog display name of the commercial product."
      - name: product_type
        description: "The operational or retail classification category of the item."
      - name: price
        description: "The baseline target retail unit price tag of the item."
      - name: supply_count
        description: "The quantity metrics of baseline raw inventory elements currently available."
      - name: total_supply_cost
        description: "The underlying cost overhead to secure the physical supply inventory pipeline."
      - name: has_perishable_supply
        description: "Boolean indicator flag determining whether the supply components contain expiring items."
      - name: total_items_sold
        description: "The sum total of this specific product SKU sold. Coalesced to 0 if no transactions occurred."
      - name: total_orders
        description: "The total number of unique orders that contained at least one of this product SKU."
      - name: gross_revenue
        description: "The aggregated monetary item sales generated by this item. Coalesced to 0 if no transactions occurred."
